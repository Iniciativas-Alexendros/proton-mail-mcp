# Dokploy docker-compose para protonmail-mcp en HTTP mode.
#
# Este stack arranca:
#   - proton-bridge: Proton Mail Bridge headless (imagen community
#                    `shenxn/protonmail-bridge`) con vault persistido en volumen.
#   - mcp:           el MCP server en modo HTTP, hablando con proton-bridge
#                    por la red interna `proton-net`.
#
# El servicio se llama `proton-bridge` (no `bridge`) para evitar colisión con
# otros stacks Dokploy compartiendo `dokploy-network` que pudieran tener un
# servicio homónimo — Docker embedded DNS resolvería contra cualquiera y la
# conexión a IMAP/SMTP falla con ECONNREFUSED a una IP arbitraria.
#
# IMPORTANTE: el primer arranque requiere login one-off interactivo en bridge-cli:
#   ssh dokploy
#   cd /etc/dokploy/compose/<app>/code
#   docker compose up -d proton-bridge
#   docker compose run --rm --entrypoint="" proton-bridge /protonmail/proton-bridge --cli
#   Dentro: login → 2FA → info (copiar "Bridge password") → exit
#   Pegar el bridge password en PROTON_BRIDGE_PASS (env del compose en Dokploy)
#
# Tras el login inicial, el volumen `bridge-data` persiste el vault y los
# siguientes arranques son automáticos.
#
# Traefik: el routing a `protonmail.alexendros.me` lo gestiona Dokploy creando
# el dominio via API (compose.create + domain.create). Este compose NO declara
# labels Traefik manualmente — Dokploy los inyecta durante el deploy.

services:
  proton-bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: protonmail-mcp-bridge:latest
    restart: unless-stopped
    volumes:
      - bridge-data:/root
    expose:
      - "1143"
      - "1025"
    networks:
      - proton-net
    healthcheck:
      # nc no está en la imagen base shenxn/protonmail-bridge.
      # bash con /dev/tcp es portable y no requiere binarios extra.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/1143' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mcp:
    build: .
    restart: unless-stopped
    depends_on:
      proton-bridge:
        condition: service_healthy
    environment:
      PROTON_BRIDGE_HOST: proton-bridge
      # 143/25 son los puertos externos del entrypoint de shenxn/protonmail-bridge
      # (socat los reenvía a 127.0.0.1:1143/1025 donde escucha el daemon).
      # 143 sirve IMAP plain + STARTTLS; 25 sirve SMTP plain + STARTTLS.
      PROTON_BRIDGE_IMAP_PORT: 143
      PROTON_BRIDGE_SMTP_PORT: 25
      PROTON_BRIDGE_USER: ${PROTON_BRIDGE_USER}
      PROTON_BRIDGE_PASS: ${PROTON_BRIDGE_PASS}
      PROTON_MAIL_FROM: ${PROTON_MAIL_FROM}
      PROTON_BRIDGE_TLS_INSECURE: "true"
      NODE_ENV: production
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 8787
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_ALLOWED_ORIGINS: ${MCP_ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "8787"
    networks:
      - proton-net
      - dokploy-network

volumes:
  bridge-data:

networks:
  proton-net:
    driver: bridge
  dokploy-network:
    external: true
