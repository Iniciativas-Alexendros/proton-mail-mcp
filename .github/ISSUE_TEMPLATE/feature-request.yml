name: 💡 Feature request
description: Suggest a new tool, transport, or capability for `@alexendros/proton-mail-mcp`.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Feature requests are evaluated against the project's scope: **expose Proton Mail capabilities to MCP clients without leaking E2E-encrypted material outside Bridge**. Anything that would require Proton's web/API directly (vs Bridge IMAP/SMTP) is out of scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing pain. Generic "would be nice" requests are usually closed.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Be concrete — name the new tool, its inputs, its outputs. If it's a transport, describe the protocol.
      placeholder: |
        New tool: `proton_archive_emails`
        Inputs: `{ uids: number[], mailbox: string }`
        Output: `{ archived: number[], failed: number[] }`
        Behaviour: marks emails as `\Deleted` in source mailbox and `\Recent` in `Archive` (Proton-specific naming).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What did you try first? Why doesn't it work?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - new tool (extends MCP surface)
        - new transport (stdio, HTTP, SSE...)
        - performance improvement
        - developer experience (build, tests, CI)
        - documentation
        - other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submit checklist
      options:
        - label: This works through Proton Mail Bridge (IMAP/SMTP). I am NOT asking to bypass Bridge or call Proton's web API directly.
          required: true
        - label: I searched [open and closed issues](../../issues?q=is%3Aissue) and did not find a duplicate.
          required: true
        - label: I'm willing to discuss trade-offs (some requests are rejected if they enlarge attack surface or break the threat model in SECURITY.md).
          required: true
